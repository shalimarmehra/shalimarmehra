name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 03:00 UTC
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=shalimarmehra&background=14130a&stroke=2f3d20&ring=758956&fire=8e633f&currStreakLabel=758956&currStreakNum=ffffff&sideLabels=d4c5b9&sideNums=ffffff&dates=8e633f&border_radius=8
          path: profile/streak.svg
          
      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
